# docker-compose.yml

version: "3.8"

services:

  # ─── PostgreSQL Database ──────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: research_postgres
    environment:
      POSTGRES_DB: research_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d research_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - research_network

  # ─── Redis Cache ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: research_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - research_network

  # ─── Backend API ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: research_backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql://user:password@postgres:5432/research_db
      - REDIS_URL=redis://redis:6379
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - PRIMARY_MODEL=${PRIMARY_MODEL:-gpt-4-turbo-preview}
      - FAST_MODEL=${FAST_MODEL:-gpt-3.5-turbo}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-ada-002}
      - DEBUG=${DEBUG:-True}
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db
      - logs_data:/app/logs
    networks:
      - research_network
    restart: unless-stopped

  # ─── Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: research_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api/v1
      - REACT_APP_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    networks:
      - research_network
    restart: unless-stopped

# ─── Volumes ────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  chroma_data:
  logs_data:

# ─── Networks ───────────────────────────────────────────
networks:
  research_network:
    driver: bridge